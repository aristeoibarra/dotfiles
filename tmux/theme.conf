# Catppuccin Mocha (auto-generated by 'theme')

# Status bar
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name with prefix indicator (powerline)
set -g status-left "#{?client_prefix,#[bg=#f9e2af]#[fg=#11111b]#[bold] #S #[fg=#f9e2af]#[bg=#1e1e2e],#[bg=#89b4fa]#[fg=#11111b]#[bold] #S #[fg=#89b4fa]#[bg=#1e1e2e]} "

# Right: CPU + RAM widgets with powerline separators
set -g status-right "#[fg=#45475a]#[bg=#45475a]#[fg=#cdd6f4] CPU #(/Users/aristeoibarra/dotfiles/tmux/scripts/cpu.sh) #[fg=#6c7086]#[bg=#6c7086]#[fg=#11111b] RAM #(/Users/aristeoibarra/dotfiles/tmux/scripts/ram.sh) "

# Window tabs
set -g window-status-format "#[fg=#1e1e2e]#[bg=#45475a]#[fg=#6c7086]#[bg=#45475a] #W#{?#{e|>:#{window_panes},1},[#{window_panes}],} #[fg=#45475a]#[bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#1e1e2e]#[bg=#74c7ec]#[fg=#11111b]#[bg=#74c7ec]#[bold] #W#{?#{e|>:#{window_panes},1},[#{window_panes}],} #[fg=#74c7ec]#[bg=#1e1e2e]"
set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#74c7ec"

# Messages and mode
set -g message-style "bg=#45475a,fg=#cdd6f4"
set -g mode-style "bg=#45475a,fg=#cdd6f4"

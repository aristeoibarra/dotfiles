# Gruvbox Dark (auto-generated by 'theme')

# Status bar
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name with prefix indicator (powerline)
set -g status-left "#{?client_prefix,#[bg=#fabd2f]#[fg=#1d2021]#[bold] #S #[fg=#fabd2f]#[bg=#282828],#[bg=#458588]#[fg=#1d2021]#[bold] #S #[fg=#458588]#[bg=#282828]} "

# Right: CPU + RAM widgets with powerline separators
set -g status-right "#[fg=#504945]#[bg=#504945]#[fg=#ebdbb2] CPU #(/Users/aristeoibarra/dotfiles/tmux/scripts/cpu.sh) #[fg=#928374]#[bg=#928374]#[fg=#1d2021] RAM #(/Users/aristeoibarra/dotfiles/tmux/scripts/ram.sh) "

# Window tabs
set -g window-status-format "#[fg=#282828]#[bg=#504945]#[fg=#928374]#[bg=#504945] #W #[fg=#504945]#[bg=#282828]"
set -g window-status-current-format "#[fg=#282828]#[bg=#83a598]#[fg=#1d2021]#[bg=#83a598]#[bold] #W #[fg=#83a598]#[bg=#282828]"
set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#928374"
set -g pane-active-border-style "fg=#83a598"

# Messages and mode
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g mode-style "bg=#504945,fg=#ebdbb2"

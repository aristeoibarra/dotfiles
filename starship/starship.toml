# Starship Configuration
# Palette managed by `theme` command

palette = "active_theme"

command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$character"""

# Right prompt shows command duration
right_format = """$cmd_duration"""

# BEGIN THEME PALETTE
[palettes.active_theme]
text = "#ebdbb2"
subtext = "#928374"
green = "#b8bb26"
blue = "#458588"
cyan = "#8ec07c"
red = "#fb4934"
yellow = "#fabd2f"
mauve = "#d3869b"
# END THEME PALETTE

# =============================================================================
# MODULES
# =============================================================================

[character]
success_symbol = "[❯](cyan)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue"
format = "[$path]($style) "

[git_branch]
symbol = ""
style = "mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style)"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[nodejs]
symbol = " "
style = "green"
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[cmd_duration]
min_time = 500
style = "subtext"
format = "[$duration]($style)"
